<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>몸 건강 마음 건강 자가진단 - MLCC</title>
    <style>
        :root { --danger: #ff4d4f; --warning: #faad14; --success: #52c41a; --primary: #4a90e2; --bg: #f0f4f8; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .modal { background: white; width: 100%; max-width: 450px; padding: 40px 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 10px; margin-bottom: 30px; overflow: hidden; display: none; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }
        h2 { font-size: 1.35rem; color: #333; margin-bottom: 25px; line-height: 1.5; word-break: keep-all; }
        .options { display: grid; gap: 12px; }
        .btn-option { padding: 18px; border: 2px solid #f2f2f2; border-radius: 18px; background: white; font-size: 1.05rem; cursor: pointer; transition: all 0.2s; color: #444; font-weight: 500; outline: none; -webkit-tap-highlight-color: transparent; }
        .btn-option:hover { border-color: var(--primary); background: #f8fbff; color: var(--primary); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        #survey-content, #result-container { display: none; }
        
        /* 결과 점수 강조 스타일 */
        .big-score-area { margin-bottom: 20px; }
        .score-label { font-size: 1rem; color: #888; font-weight: bold; margin-bottom: 5px; display: block; }
        .big-score-num { font-size: 4.5rem; font-weight: 900; line-height: 1; margin: 10px 0; transition: color 0.5s; }
        .score-unit { font-size: 1.2rem; font-weight: bold; margin-left: 5px; }

        /* 결과 리포트 카드 */
        .result-card { text-align: left; background: #fff; border-radius: 20px; border: 2px solid #eee; overflow: hidden; }
        .result-header { padding: 20px; color: white; font-weight: bold; font-size: 1.2rem; text-align: center; }
        .result-body { padding: 25px; line-height: 1.7; color: #555; font-size: 1rem; }
        .user-info { font-size: 0.9rem; color: #aaa; margin-bottom: 8px; display: block; text-align: center; }

        .footer-logo { margin-top: 40px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
        .logo-box { font-weight: 900; font-size: 1.4rem; color: #2c3e50; }
        .logo-subtext { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<div class="modal">
    <!-- 1단계: 인트로 -->
    <div id="intro-content">
        <h2 style="color:var(--primary);">🌿 몸 건강 마음 건강<br>자가 진단 테스트</h2>
        <p style="text-align:left; font-size:0.95rem; font-weight:bold; margin-bottom:10px;">• 성별 선택</p>
        <div class="grid-2" style="margin-bottom:25px;">
            <button type="button" class="btn-option" onclick="handleInfo('gender', '남성')">남성</button>
            <button type="button" class="btn-option" onclick="handleInfo('gender', '여성')">여성</button>
        </div>
        <p style="text-align:left; font-size:0.95rem; font-weight:bold; margin-bottom:10px;">• 연령대 선택</p>
        <div class="grid-3">
            <button type="button" class="btn-option" onclick="handleInfo('age', '20대')">20대</button>
            <button type="button" class="btn-option" onclick="handleInfo('age', '30대')">30대</button>
            <button type="button" class="btn-option" onclick="handleInfo('age', '40대')">40대</button>
            <button type="button" class="btn-option" onclick="handleInfo('age', '50대')">50대</button>
            <button type="button" class="btn-option" onclick="handleInfo('age', '60대')">60대</button>
            <button type="button" class="btn-option" onclick="handleInfo('age', '70대↑')">70대↑</button>
        </div>
    </div>

    <!-- 2단계: 설문 -->
    <div id="survey-content">
        <div class="progress-bar" id="p-bar" style="display:block;"><div class="progress-fill" id="progress"></div></div>
        <h2 id="question-text"></h2>
        <div class="options" id="options-container"></div>
    </div>

    <!-- 3단계: 결과 통합 리포트 (점수 상단 배치) -->
    <div id="result-container">
        <div class="big-score-area">
            <span class="score-label">나의 종합 순환 점수</span>
            <div class="big-score-num" id="final-score-val">0<span class="score-unit">점</span></div>
        </div>

        <div class="result-card" id="result-card">
            <div class="result-header" id="result-header">진단 결과</div>
            <div class="result-body">
                <span class="user-info" id="user-info-text"></span>
                <div id="advice-text"></div>
            </div>
        </div>
        <button onclick="location.reload()" style="margin-top:25px; padding:12px 30px; border:none; background:#eee; border-radius:30px; cursor:pointer; font-weight:bold; color:#777;">테스트 다시하기</button>
    </div>

    <div class="footer-logo">
        <div class="logo-box">MLCC</div>
        <div class="logo-subtext">마인드 셋 라이프 코칭센터</div>
    </div>
</div>

<script>
    var userData = { gender: '', age: '' };
    var currentIdx = 0;
    var totalScore = 0;

    var questions = [
        {"q": "1. 충분히 자도 아침에 몸이 무겁고 머리가 맑지 않은가요?", "a": ["매우 그렇다", "가끔 그렇다", "거의 없다"], "s": [2, 1, 0]},
        {"q": "2. 식사 후 소화가 안 되거나 가스가 자주 차나요?", "a": ["자주 그렇다", "가끔 그렇다", "거의 없음"], "s": [2, 1, 0]},
        {"q": "3. 손발이 차거나 특정 부위가 자주 붓는 편인가요?", "a": ["매우 그렇다", "가끔 그렇다", "거의 없다"], "s": [2, 1, 0]},
        {"q": "4. 어깨/목을 눌렀을 때 비명이 나올 만큼 아픈가요?", "a": ["예", "아니요"], "s": [2, 0]},
        {"q": "5. 가장 고민되는 신체 불편 증상은?", "a": ["만성 피로", "근육통", "소화 불량", "스트레스/불면"], "s": [2, 2, 2, 2]},
        {"q": "6. 하루 중 같은 자세로 있는 시간은?", "a": ["8시간 이상", "4~8시간", "4시간 미만"], "s": [2, 1, 0]},
        {"q": "7. 일주일간 운동을 하는 횟수는?", "a": ["거의 안 함", "1~2회", "3회 이상"], "s": [2, 1, 0]}
    ];

    function handleInfo(key, value) {
        userData[key] = value;
        if(userData.gender && userData.age) {
            document.getElementById('intro-content').style.display = 'none';
            document.getElementById('survey-content').style.display = 'block';
            showQuestion();
        }
    }

    function showQuestion() {
        var qObj = questions[currentIdx];
        document.getElementById('question-text').innerText = qObj.q;
        var container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('progress').style.width = ((currentIdx + 1) / questions.length * 100) + '%';

        for(var i=0; i<qObj.a.length; i++) {
            (function(idx) {
                var btn = document.createElement('button');
                btn.type = "button";
                btn.className = 'btn-option';
                btn.innerText = qObj.a[idx];
                btn.onclick = function() { nextStep(qObj.s[idx]); };
                container.appendChild(btn);
            })(i);
        }
    }

    function nextStep(score) {
        totalScore += score;
        currentIdx++;
        if(currentIdx < questions.length) {
            showQuestion();
        } else {
            displayResult();
        }
    }

    function displayResult() {
        document.getElementById('survey-content').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';
        
        var scoreVal = document.getElementById('final-score-val');
        var header = document.getElementById('result-header');
        var userInfo = document.getElementById('user-info-text');
        var advice = document.getElementById('advice-text');
        var card = document.getElementById('result-card');

        // 점수 텍스트 업데이트 (애니메이션 효과처럼 보이기 위해 직접 대입)
        scoreVal.innerHTML = totalScore + '<span class="score-unit">점</span>';
        userInfo.innerText = userData.age + " " + userData.gender + " 참가자 리포트";
        
        if (totalScore >= 10) {
            header.innerText = "🚨 기혈 정체 주의";
            header.style.backgroundColor = "#ff4d4f";
            scoreVal.style.color = "#ff4d4f";
            card.style.borderColor = "#ff4d4f";
            advice.innerHTML = "현재 순환 상태가 많이 정체되어 있습니다. 몸속 독소가 쌓이기 쉬운 상태이므로, 오늘 세미나에서 다룰 <b>'막힌 기운을 뚫어주는 경락법'</b>이 건강 회복의 핵심이 될 것입니다.";
        } else if (totalScore >= 6) {
            header.innerText = "⚠️ 에너지 불균형";
            header.style.backgroundColor = "#faad14";
            scoreVal.style.color = "#faad14";
            card.style.borderColor = "#faad14";
            advice.innerHTML = "순환 기운이 불안정하여 컨디션 기복이 큽니다. 근육 뭉침이나 부종이 만성화되기 전에 <b>'일상적인 자가 순환 관리'</b>를 습관화하는 것이 중요합니다.";
        } else {
            header.innerText = "✅ 비교적 양호";
            header.style.backgroundColor = "#52c41a";
            scoreVal.style.color = "#52c41a";
            card.style.borderColor = "#52c41a";
            advice.innerHTML = "전반적인 기혈 흐름이 원활합니다. 하지만 방심은 금물! 세미나를 통해 <b>'더 맑은 기운을 유지하는 예방 경락법'</b>을 익혀 건강 지수를 높여보세요.";
        }
    }
</script>
</body>
</html>
